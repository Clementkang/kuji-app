<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Kuji Project</title>
    <!-- Visual Scan Path Anchor: Fluid mobile container overflow cleanup -->
    <style>
      html, body {
        width: 100%;
        height: 100%;
        padding: 0;
        margin: 0;
        overflow: hidden;
        background: #231F20;
      }
      #unity-canvas {
        width: 100vw !important;
        height: 100vh !important;
        position: absolute;
        top: 0;
        left: 0;
      }
    </style>
  </head>
  <body>
    <canvas id="unity-canvas" tabindex="-1"></canvas>
    <script src="Build/KujiGitHub.loader.js"></script>
    <script>
      var config = {
        arguments: [],
        dataUrl: "Build/KujiGitHub.data",
        frameworkUrl: "Build/KujiGitHub.framework.js",
        codeUrl: "Build/KujiGitHub.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Clem",
        productName: "Kuji_Project",
        productVersion: "1.0",
        // FIXED RESOLUTION CAP: Locks the pixel ratio to 1 explicitly for mobile browsers
        devicePixelRatio: 1, 
      };

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
      }

      createUnityInstance(document.querySelector("#unity-canvas"), config).then((unityInstance) => {
        // Successful initialization handler
      }).catch((message) => {
        alert(message);
      });
    </script>
  </body>
</html>
