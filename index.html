<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Kuji Project</title>
    <!-- Visual Scan Path Anchor: Fluid mobile container overflow cleanup -->
    <style>
      html, body {
        width: 100%;
        height: 100%;
        padding: 0;
        margin: 0;
        overflow: hidden;
        background: #231F20;
      }
      #unity-canvas {
        width: 100vw !important;
        height: 100vh !important;
        position: absolute;
        top: 0;
        left: 0;
      }
    </style>
  </head>
  <body>
    <canvas id="unity-canvas" tabindex="-1"></canvas>
    <script src="Build/KujiGitHub.loader.js"></script>
    <script>
      var config = {
        arguments: [],
        dataUrl: "Build/KujiGitHub.data.unityweb",
        frameworkUrl: "Build/KujiGitHub.framework.js.unityweb",
        codeUrl: "Build/KujiGitHub.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Clem",
        productName: "Kuji_Project",
        productVersion: "1.0",
        devicePixelRatio: window.devicePixelRatio || 1, 
      };

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
      }

      createUnityInstance(document.querySelector("#unity-canvas"), config).then((unityInstance) => {
        // SUCCESSFUL ENGINE BOOT: Initialize the touch listener to trigger fullscreen and landscape lock
        setupMobileOrientationLock();
      }).catch((message) => {
        alert(message);
      });

      function setupMobileOrientationLock() {
        var canvas = document.querySelector("#unity-canvas");
        
        // Listen for the very first interaction tap to bypass browser security guards
        canvas.addEventListener("click", function () {
          // 1. Enter Fullscreen Mode
          if (canvas.requestFullscreen) {
            canvas.requestFullscreen().then(lockOrientation).catch(logError);
          } else if (canvas.webkitRequestFullscreen) { /* Safari iOS Support */
            canvas.webkitRequestFullscreen().then(lockOrientation).catch(logError);
          } else {
            lockOrientation();
          }
        }, { once: true }); // Executing "once: true" strips the event handler right after use to prevent lag
      }

      function lockOrientation() {
        // 2. Lock Orientation using standard Screen Orientation API parameters
        if (window.screen && window.screen.orientation && window.screen.orientation.lock) {
          window.screen.orientation.lock("landscape").then(function() {
            console.log("Screen orientation successfully locked into landscape mode.");
          }).catch(function(error) {
            console.warn("Screen orientation lock blocked or unsupported on this device: ", error);
          });
        }
      }

      function logError(err) {
        console.warn("Fullscreen initialization deferred: ", err);
      }
    </script>
  </body>
</html>
